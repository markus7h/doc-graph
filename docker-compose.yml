services:
  doc-graph:
    build: .
    container_name: doc-graph
    restart: unless-stopped
    ports:
      - "5775:5775"   # MCP (streamable HTTP)
      - "5776:5776"   # Graph-Viewer (statisches HTML)
    environment:
      # --- LLM: geteiltes mistral auf dem llama-server (OpenAI-kompatibel).
      # ZWINGEND dasselbe Modell wie paperless-ai: 16 GB VRAM fassen kein zweites
      # großes Modell neben dem dauergeladenen mistral. Antworten liefert ohnehin
      # Claude via only_context. Kontext (num_ctx) wird server-seitig gesetzt (-c). ---
      LLM_BASE_URL: ${LLM_BASE_URL:-http://paperless-llama:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-mistral-small3.2:24b}
      # --- Embeddings: eigener CPU-llama-server (bge-m3), separater Port ---
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://paperless-llama-embed:11435/v1}
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      EMBED_DIM: ${EMBED_DIM:-1024}
      # --- Paperless-NGX (Dokumentquelle): via LAN-DNS 'paperless' erreichbar ---
      PAPERLESS_URL: ${PAPERLESS_URL:-https://paperless/}
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN}
      # --- Server ---
      MCP_PORT: "5775"
      VIEWER_PORT: "5776"
      PUBLIC_HOST: ${PUBLIC_HOST:-myubuntu}   # Host für die Viewer-URL im Browser
      PROJECTS_DIR: /data/projects
      MAX_ASYNC: ${MAX_ASYNC:-2}
    volumes:
      # Persistente KG-Stores, ein Unterordner pro Projekt
      - ./data/projects:/data/projects
      # Optional für ingest_directory: lokales Dokumentverzeichnis read-only.
      # Pfad an myubuntu anpassen und einkommentieren; primäre Quelle ist Paperless.
      # - /home/markus/dokumente:/data/inputs:ro
    networks:
      # Selbes Netz wie die llama-Server + paperless-ai: löst 'paperless-llama' /
      # 'paperless-llama-embed' und 'paperless' (NGX via LAN-DNS) auf.
      - paperless-ai_default

networks:
  paperless-ai_default:
    external: true
