services:
  doc-graph:
    build: .
    container_name: doc-graph
    restart: unless-stopped
    ports:
      - "5775:5775"   # MCP (streamable HTTP)
      - "5776:5776"   # Graph-Viewer (statisches HTML)
    environment:
      # --- LLM: geteilter llm-stack (OpenAI-kompatibel). Alias 'llm' zeigt immer
      # auf das AKTIVE Chat-Modell (Normalbetrieb mistral, waehrend des Ingests
      # qwen — Docker-DNS loest nur laufende Container auf). Antworten liefert
      # ohnehin Claude via only_context. Kontext server-seitig gesetzt (-c). ---
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-mistral-small3.2:24b}
      # --- Embeddings: eigener CPU-llama-server (bge-m3), separater Port ---
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://llm-embed:11435/v1}
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      EMBED_DIM: ${EMBED_DIM:-1024}
      # --- Paperless-NGX (Dokumentquelle): via LAN-DNS 'paperless' erreichbar ---
      PAPERLESS_URL: ${PAPERLESS_URL:-https://paperless/}
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN}
      # --- Server ---
      MCP_PORT: "5775"
      VIEWER_PORT: "5776"
      PUBLIC_HOST: ${PUBLIC_HOST:-myubuntu}   # Host für die Viewer-URL im Browser
      PROJECTS_DIR: /data/projects
      # --- Backup: tar.gz der Projekte ins gemountete Ziel, Zeitplan in der Web-UI ---
      BACKUP_DIR: /backups
      MAX_BACKUPS: ${MAX_BACKUPS:-10}
      MAX_ASYNC: ${MAX_ASYNC:-2}
      # Timeout je LLM-Call (s). Bei CPU-Offload/niedrigem t/s hochsetzen. ---
      LLM_TIMEOUT: ${LLM_TIMEOUT:-480}
    volumes:
      # Persistente KG-Stores, ein Unterordner pro Projekt.
      # ABSOLUTER Pfad bewusst: ein 'docker compose up' aus dem Git-Repo (falsches
      # CWD) darf NICHT ./data des Repos mounten -> sonst leerer Index, alle Queries
      # liefern no-context. Kanonischer Datenort ist das Deploy-Dir.
      - /var/local/mydocker/doc-graph/data/projects:/data/projects
      # Backup-Ziel (analog ai-rem: eigener Ordner neben ai-rem in OneDrive).
      # Der Server rotiert dort auf die letzten MAX_BACKUPS Archive.
      - ${DOC_GRAPH_BACKUP_PATH:-/home/markus/mystorage/OneDrive/doc-graph}:/backups
      # Optional für ingest_directory: lokales Dokumentverzeichnis read-only.
      # Pfad an den Host anpassen und einkommentieren (Verzeichnis muss existieren,
      # sonst legt Docker es leer als root an); primäre Quelle bleibt Paperless.
      # - /home/markus/dokumente:/data/inputs:ro
      # GPU-Swap: server.py steuert per swap-to-*.sh die llm-stack-Container
      # (llm-qwen rein/llm-mistral raus) während eines Ingests. Root-äquiv. auf
      # dem Host — bewusst, das Netz ist intern. Abschaltbar via INGEST_SWAP=0.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      # Geteiltes LLM-Netz (gehört dem llm-stack-Compose-Projekt): löst 'llm'
      # (aktives Chat-Modell) und 'llm-embed' auf. 'paperless' (NGX) via LAN-DNS.
      - llm-net

networks:
  llm-net:
    external: true
